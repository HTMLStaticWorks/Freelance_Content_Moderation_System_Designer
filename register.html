<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SafeQueue</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body style="overflow-y: auto;">
    <div class="floating-toggles"
        style="position: fixed; top: 24px; right: 24px; display: flex; gap: 12px; z-index: 1000;">
        <button class="icon-btn theme-toggle"
            style="width: 40px; height: 40px; border: var(--border); display: flex; align-items: center; justify-content: center; background: var(--bg-primary);"><i
                class="ph ph-moon"></i></button>
        <button class="icon-btn rtl-toggle"
            style="width: 40px; height: 40px; border: var(--border); display: flex; align-items: center; justify-content: center; background: var(--bg-primary);"><i
                class="ph ph-arrows-left-right"></i></button>
    </div>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 24px;">
                    <i class="ph-bold ph-shield-check"></i>SAFE<span>QUEUE</span>
                </a>
                <h2 class="font-mono" style="font-size: 1rem;">CREATE_ACCOUNT</h2>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper" style="position: relative;">
                        <input type="password" id="password" class="form-input" required minlength="8" style="padding-right: 48px;">
                        <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px;">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <div class="password-input-wrapper" style="position: relative;">
                        <input type="password" id="confirm" class="form-input" required style="padding-right: 48px;">
                        <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px;">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group" style="display: flex; gap: 8px; align-items: center;">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" style="margin: 0; text-transform: none; cursor: pointer;">I accept the <a href="#" class="auth-link">Terms & Conditions</a> and <a href="#" class="auth-link">privacy policy</a></label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <div class="social-auth">
                <button class="btn google-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                    </svg>
                    Google
                </button>
                <button class="btn apple-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.82M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.56 2.95-1.39z"/>
                    </svg>
                    Apple
                </button>
            </div>

            <p style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                Already have an account? <a href="login.html"
                    style="color: var(--color-primary); font-weight: 500;">Login</a>
            </p>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', function (e) {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (pass !== confirm) {
                e.preventDefault();
                alert('Passwords do not match');
            }
        });
    </script>
    <script src="assets/js/main.js"></script>
</body>

</html>
