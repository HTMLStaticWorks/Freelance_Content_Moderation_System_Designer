<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SafeQueue</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body style="overflow-y: auto;">
    <div class="floating-toggles"
        style="position: fixed; top: 24px; right: 24px; display: flex; gap: 12px; z-index: 1000;">
        <button class="icon-btn theme-toggle"
            style="width: 40px; height: 40px; border: var(--border); display: flex; align-items: center; justify-content: center; background: var(--bg-primary);"><i
                class="ph ph-moon"></i></button>
        <button class="icon-btn rtl-toggle"
            style="width: 40px; height: 40px; border: var(--border); display: flex; align-items: center; justify-content: center; background: var(--bg-primary);"><i
                class="ph ph-arrows-left-right"></i></button>
    </div>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 24px;">
                    <i class="ph-bold ph-shield-check"></i>SAFE<span>QUEUE</span>
                </a>
                <h2 class="font-mono" style="font-size: 1rem;">AUTHENTICATION_REQUIRED</h2>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper" style="position: relative;">
                        <input type="password" id="password" class="form-input" required minlength="8" style="padding-right: 48px;">
                        <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px;">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-options" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.875rem;">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="checkbox" id="remember" style="cursor: pointer;">
                        <label for="remember" style="margin: 0; text-transform: none; cursor: pointer;">Remember Me</label>
                    </div>
                    <a href="#" class="auth-link" style="font-size: 0.875rem;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <div class="social-auth">
                <button class="btn google-btn"><i class="ph-bold ph-google-logo"></i> Google</button>
                <button class="btn apple-btn"><i class="ph-bold ph-apple-logo"></i> Apple</button>
            </div>

            <p style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a href="register.html"
                    style="color: var(--color-primary); font-weight: 600;">Register</a>
            </p>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>

</html>
